name: Evaluation Suite

on:
  workflow_dispatch:
    inputs:
      models:
        description: '逗号分隔的模型列表，例如 dashscope:qwen-plus,zhipu:glm-5'
        required: false
        default: 'dashscope:qwen-plus'
      categories:
        description: '逗号分隔的用例类别，空 = sales_analytics'
        required: false
        default: 'sales_analytics'
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'apps/api/**'
      - 'tests/cases/**'
      - 'config/llm_router.yaml'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run pytest tests/unit -q

  evaluation:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[eval]'))
    env:
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
      SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
      SHOPIFY_API_VERSION: '2025-10'
      SIDEKICK_TEST_MODELS: ${{ inputs.models || 'dashscope:qwen-plus' }}
      SIDEKICK_TEST_CATEGORIES: ${{ inputs.categories || 'sales_analytics' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - name: Run integration tests with thresholds
        run: |
          uv run pytest tests/integration -v -s --tb=short
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-${{ github.run_id }}
          path: reports/
          retention-days: 30
